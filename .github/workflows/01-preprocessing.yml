name: 01 Preprocessing Dataset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "1_Eksperimen_Preprocessing/**"
      - ".github/workflows/01-preprocessing.yml"

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 1_Eksperimen_Preprocessing/requirements.txt

      - name: Run preprocessing
        run: |
          cd 1_Eksperimen_Preprocessing/preprocessing
          python automate_MuhammadSidiqFirdaus.py

      - name: Upload processed dataset
        uses: actions/upload-artifact@v4
        with:
          name: processed-dataset
          path: 1_Eksperimen_Preprocessing/preprocessing/namadataset_preprocessing